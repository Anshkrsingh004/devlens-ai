name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch cancels the previous run, so CI minutes are
# not spent on commits that are already superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # All three are validated by src/lib/env.ts at boot. CI only needs
  # syntactically valid values — nothing here is deployed, and no job in this
  # workflow connects to a database.
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  # Deliberately unreachable placeholders. A real connection string here would
  # let a CI run mutate production data.
  DATABASE_URL: postgresql://user:pass@localhost:6543/devlens?pgbouncer=true
  DIRECT_URL: postgresql://user:pass@localhost:5432/devlens
  # Fake credentials. CI never authenticates against a real provider.
  BETTER_AUTH_SECRET: ci-secret-at-least-32-characters-long
  BETTER_AUTH_URL: http://localhost:3000
  GOOGLE_CLIENT_ID: ci-client-id
  GOOGLE_CLIENT_SECRET: ci-client-secret
  GROQ_API_KEY: gsk_ci_key_not_real

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Unit and component tests
        run: npm run test

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
